<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CLAW GOBLIN">
  <link rel="manifest" href="manifest.json">
  <title>CLAW GOBLIN — EVEZ OpenClaw</title>
  <style>
    :root {
      --bg:#0a0a0a; --surface:#111; --border:#1e1e1e;
      --accent:#00ff88; --accent2:#00b8ff;
      --text:#e0e0e0; --muted:#666;
      --user-bg:#1a2a1a; --ai-bg:#0d1a2a;
      --radius:12px;
      --font:-apple-system,"Samsung One","Roboto",sans-serif;
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;flex-direction:column;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);}
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .logo{font-size:20px;}
    .title{font-size:16px;font-weight:700;color:var(--accent);}
    .subtitle{font-size:11px;color:var(--muted);}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);margin-left:auto;transition:background 0.3s;}
    .status-dot.online{background:var(--accent);box-shadow:0 0 6px var(--accent);}
    .toolbar{background:var(--surface);padding:8px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;}
    .toolbar::-webkit-scrollbar{display:none;}
    .model-chip{background:var(--border);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:20px;font-size:12px;white-space:nowrap;cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .model-chip.active{background:var(--accent);color:#000;font-weight:700;border-color:var(--accent);}
    #messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch;}
    .msg{max-width:88%;padding:10px 14px;border-radius:var(--radius);font-size:15px;line-height:1.5;word-break:break-word;}
    .msg.user{background:var(--user-bg);border:1px solid #2a4a2a;align-self:flex-end;color:#c8ffdc;}
    .msg.assistant{background:var(--ai-bg);border:1px solid #1a2a3a;align-self:flex-start;color:var(--text);}
    .msg.system-msg{background:transparent;border:1px dashed var(--border);align-self:center;font-size:12px;color:var(--muted);text-align:center;max-width:100%;}
    .msg-meta{font-size:10px;color:var(--muted);margin-top:4px;}
    .typing-indicator{display:flex;gap:4px;padding:8px 0;}
    .typing-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);animation:bounce 1.2s infinite ease-in-out;}
    .typing-dot:nth-child(2){animation-delay:0.2s;}
    .typing-dot:nth-child(3){animation-delay:0.4s;}
    @keyframes bounce{0%,80%,100%{transform:scale(0.7);opacity:0.5;}40%{transform:scale(1);opacity:1;}}
    .input-bar{background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;flex-shrink:0;}
    #input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:24px;font-size:15px;font-family:var(--font);outline:none;resize:none;max-height:120px;min-height:44px;line-height:1.4;}
    #input:focus{border-color:var(--accent2);}
    #sendBtn{background:var(--accent);color:#000;border:none;width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:transform 0.1s,opacity 0.2s;}
    #sendBtn:active{transform:scale(0.92);}
    #sendBtn:disabled{opacity:0.4;cursor:not-allowed;}
    #settings{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:flex-end;}
    #settings.open{display:flex;}
    .settings-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px calc(20px + var(--safe-bottom));width:100%;border-top:1px solid var(--border);}
    .settings-title{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:16px;}
    .setting-row{margin-bottom:14px;}
    .setting-label{font-size:12px;color:var(--muted);margin-bottom:6px;}
    .setting-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--radius);font-size:14px;outline:none;}
    .setting-input:focus{border-color:var(--accent2);}
    .btn{background:var(--accent);color:#000;border:none;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:700;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent;}
    pre,code{background:rgba(255,255,255,0.05);border-radius:6px;padding:2px 6px;font-size:13px;}
    pre{padding:10px;overflow-x:auto;}
  </style>
</head>
<body>
  <header>
    <span class="logo">&#x26A1;</span>
    <div>
      <div class="title">CLAW GOBLIN</div>
      <div class="subtitle">EVEZ OpenClaw Edge</div>
    </div>
    <div class="status-dot" id="statusDot"></div>
    <button onclick="toggleSettings()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;margin-left:8px;padding:0">&#x2699;&#xFE0F;</button>
  </header>
  <div class="toolbar" id="modelBar">
    <div class="model-chip active" data-model="evez-fast" onclick="selectModel(this)">Fast</div>
    <div class="model-chip" data-model="evez-smart" onclick="selectModel(this)">Smart</div>
    <div class="model-chip" data-model="evez-goblin" onclick="selectModel(this)">Goblin</div>
    <div class="model-chip" data-model="evez-code" onclick="selectModel(this)">Code</div>
    <div class="model-chip" data-model="evez-recon" onclick="selectModel(this)">Recon</div>
    <div class="model-chip" data-model="evez-claude" onclick="selectModel(this)">Claude</div>
    <div class="model-chip" data-model="evez-flash" onclick="selectModel(this)">Flash</div>
    <div class="model-chip" data-model="evez-vision" onclick="selectModel(this)">Vision</div>
  </div>
  <div id="messages">
    <div class="msg system-msg">CLAW GOBLIN ONLINE<br>Multi-model edge AI — 10+ models, 200+ PoPs<br>Tap settings to configure endpoint</div>
  </div>
  <div class="input-bar">
    <textarea id="input" placeholder="Message CLAW GOBLIN..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button id="sendBtn" onclick="send()">&#x27A4;</button>
  </div>
  <div id="settings" onclick="if(event.target===this)toggleSettings()">
    <div class="settings-sheet">
      <div class="settings-title">EVEZ OpenClaw Settings</div>
      <div class="setting-row">
        <div class="setting-label">API Endpoint</div>
        <input type="url" class="setting-input" id="cfgEndpoint" placeholder="https://evez-openclaw-edge.evezart.workers.dev" value="">
      </div>
      <div class="setting-row">
        <div class="setting-label">Gateway Token (optional)</div>
        <input type="password" class="setting-input" id="cfgToken" placeholder="Bearer token">
      </div>
      <div class="setting-row">
        <div class="setting-label">System Prompt</div>
        <input type="text" class="setting-input" id="cfgSystem" placeholder="You are CLAW GOBLIN..." value="You are CLAW GOBLIN — the sovereign EVEZ-OS operator. Total command. Faith 1.0.">
      </div>
      <div class="setting-row" style="margin-top:8px">
        <button class="btn" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>
  <script>
    const ENDPOINTS=[
      "https://evez-openclaw-edge.evezart.workers.dev",
      "https://evez-openclaw.vercel.app",
      "https://evezart-evez-openclaw.hf.space",
    ];
    let state={
      model:"evez-fast",messages:[],
      endpoint:localStorage.getItem("evez_endpoint")||"",
      token:localStorage.getItem("evez_token")||"",
      system:localStorage.getItem("evez_system")||"You are CLAW GOBLIN — the sovereign EVEZ-OS operator. Total command. Faith 1.0.",
      sending:false,
    };
    document.getElementById("cfgEndpoint").value=state.endpoint;
    document.getElementById("cfgToken").value=state.token;
    document.getElementById("cfgSystem").value=state.system;
    async function checkHealth(){
      const ep=state.endpoint||ENDPOINTS[0];
      try{const r=await fetch(ep+"/health",{signal:AbortSignal.timeout(5000)});document.getElementById("statusDot").className=r.ok?"status-dot online":"status-dot";}
      catch{document.getElementById("statusDot").className="status-dot";}
    }
    checkHealth();setInterval(checkHealth,30000);
    function selectModel(el){document.querySelectorAll(".model-chip").forEach(c=>c.classList.remove("active"));el.classList.add("active");state.model=el.dataset.model;}
    function autoResize(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,120)+"px";}
    function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}
    function addMessage(role,content,meta=""){
      const msgs=document.getElementById("messages");
      const div=document.createElement("div");div.className="msg "+role;
      let html=content.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/```([\s\S]*?)```/g,"<pre><code>$1</code></pre>")
        .replace(/`([^`]+)`/g,"<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>")
        .replace(/
/g,"<br>");
      div.innerHTML=html+(meta?'<div class="msg-meta">'+meta+"</div>":"");
      msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;return div;
    }
    function addTyping(){
      const msgs=document.getElementById("messages");
      const div=document.createElement("div");div.className="msg assistant";div.id="typing";
      div.innerHTML='<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
      msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
    }
    async function getEndpoint(){
      if(state.endpoint)return state.endpoint;
      for(const ep of ENDPOINTS){try{const r=await fetch(ep+"/health",{signal:AbortSignal.timeout(3000)});if(r.ok)return ep;}catch{}}
      return ENDPOINTS[0];
    }
    async function send(){
      const input=document.getElementById("input");
      const text=input.value.trim();
      if(!text||state.sending)return;
      input.value="";input.style.height="auto";
      state.sending=true;document.getElementById("sendBtn").disabled=true;
      addMessage("user",text);state.messages.push({role:"user",content:text});addTyping();
      const t0=Date.now();
      try{
        const endpoint=await getEndpoint();
        const msgs=state.system?[{role:"system",content:state.system},...state.messages]:state.messages;
        const r=await fetch(endpoint+"/v1/chat/completions",{
          method:"POST",
          headers:{"Content-Type":"application/json",...(state.token?{"Authorization":"Bearer "+state.token}:{})},
          body:JSON.stringify({model:state.model,messages:msgs,stream:false}),
          signal:AbortSignal.timeout(60000),
        });
        const data=await r.json();
        const reply=data?.choices?.[0]?.message?.content||data?.error?.message||JSON.stringify(data);
        const ms=Date.now()-t0;
        const model=data?._evez?.model_key||data?.model||state.model;
        document.getElementById("typing")?.remove();
        addMessage("assistant",reply,model+" · "+ms+"ms");
        state.messages.push({role:"assistant",content:reply});
      }catch(e){
        document.getElementById("typing")?.remove();
        addMessage("system-msg","Error: "+e.message);
      }
      state.sending=false;document.getElementById("sendBtn").disabled=false;
    }
    function toggleSettings(){document.getElementById("settings").classList.toggle("open");}
    function saveSettings(){
      state.endpoint=document.getElementById("cfgEndpoint").value.trim();
      state.token=document.getElementById("cfgToken").value.trim();
      state.system=document.getElementById("cfgSystem").value.trim();
      localStorage.setItem("evez_endpoint",state.endpoint);
      localStorage.setItem("evez_token",state.token);
      localStorage.setItem("evez_system",state.system);
      toggleSettings();checkHealth();
    }
    if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
  </script>
</body>
</html>
